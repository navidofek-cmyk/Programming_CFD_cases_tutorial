<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6db2"/>
    </marker>
    <marker id="dimArrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 5 L 10 0 L 8 5 L 10 10 z" fill="#333"/>
    </marker>
    <style>
      .outline { fill: none; stroke: #111; stroke-width: 3; }
      .center { fill: none; stroke: #777; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .flow { fill: none; stroke: #2f6db2; stroke-width: 4; marker-end: url(#arrow); }
      .dim { fill: none; stroke: #333; stroke-width: 2; marker-start: url(#dimArrow); marker-end: url(#dimArrow); }
      .guide { fill: none; stroke: #777; stroke-width: 1.5; stroke-dasharray: 6 6; }
      .label { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 24px; fill: #111; }
      .small { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 19px; fill: #111; }
      .title { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 28px; font-weight: 600; fill: #111; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="520" fill="#fff"/>
  <text x="90" y="48" class="title">Quasi-1D Laval Nozzle Domain</text>

  <!-- nozzle walls -->
  <path d="M 100 150
           C 330 170, 500 215, 750 240
           C 1000 215, 1170 170, 1400 150" class="outline"/>
  <path d="M 100 370
           C 330 350, 500 305, 750 280
           C 1000 305, 1170 350, 1400 370" class="outline"/>

  <line x1="100" y1="260" x2="1400" y2="260" class="center"/>

  <!-- flow arrows -->
  <path d="M 25 260 L 90 260" class="flow"/>
  <path d="M 1410 260 L 1475 260" class="flow"/>

  <!-- throat -->
  <line x1="750" y1="240" x2="750" y2="280" class="guide"/>
  <text x="705" y="215" class="label">throat</text>
  <text x="693" y="442" class="small">x = 1.5</text>

  <!-- length -->
  <line x1="100" y1="95" x2="1400" y2="95" class="dim"/>
  <line x1="100" y1="105" x2="100" y2="150" class="guide"/>
  <line x1="1400" y1="105" x2="1400" y2="150" class="guide"/>
  <text x="735" y="81" class="label">x in [0, 3]</text>

  <!-- throat area -->
  <line x1="810" y1="240" x2="810" y2="280" class="dim"/>
  <line x1="750" y1="240" x2="800" y2="240" class="guide"/>
  <line x1="750" y1="280" x2="800" y2="280" class="guide"/>
  <text x="825" y="265" class="label">A*</text>

  <!-- labels -->
  <text x="25" y="235" class="label">inlet</text>
  <text x="20" y="292" class="small">subsonic inflow</text>

  <text x="1320" y="235" class="label">exit</text>
  <text x="1270" y="292" class="small">fixed static pressure</text>

  <text x="1060" y="462" class="small">A(x) = 1 + 2.2 (x - 1.5)^2</text>
</svg>
