<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="monospace, sans-serif" font-size="13">

  <!-- background -->
  <rect width="820" height="320" fill="#fafafa"/>

  <!-- ══════════════════════════════════════════════════════
       LEFT PANEL — channel domain
  ══════════════════════════════════════════════════════ -->

  <!-- domain fill -->
  <rect x="100" y="70" width="480" height="160" fill="#dbeeff" stroke="none"/>

  <!-- walls -->
  <line x1="100" y1="70"  x2="580" y2="70"  stroke="#222" stroke-width="3"/>
  <line x1="100" y1="230" x2="580" y2="230" stroke="#222" stroke-width="3"/>
  <!-- inlet -->
  <line x1="100" y1="70" x2="100" y2="230" stroke="#222" stroke-width="2.5"/>
  <!-- outlet (dashed) -->
  <line x1="580" y1="70" x2="580" y2="230" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- wall hatch marks (bottom) -->
  <g stroke="#555" stroke-width="1">
    <line x1="110" y1="230" x2="100" y2="244"/><line x1="130" y1="230" x2="120" y2="244"/>
    <line x1="150" y1="230" x2="140" y2="244"/><line x1="170" y1="230" x2="160" y2="244"/>
    <line x1="190" y1="230" x2="180" y2="244"/><line x1="210" y1="230" x2="200" y2="244"/>
    <line x1="230" y1="230" x2="220" y2="244"/><line x1="250" y1="230" x2="240" y2="244"/>
    <line x1="270" y1="230" x2="260" y2="244"/><line x1="290" y1="230" x2="280" y2="244"/>
    <line x1="310" y1="230" x2="300" y2="244"/><line x1="330" y1="230" x2="320" y2="244"/>
    <line x1="350" y1="230" x2="340" y2="244"/><line x1="370" y1="230" x2="360" y2="244"/>
    <line x1="390" y1="230" x2="380" y2="244"/><line x1="410" y1="230" x2="400" y2="244"/>
    <line x1="430" y1="230" x2="420" y2="244"/><line x1="450" y1="230" x2="440" y2="244"/>
    <line x1="470" y1="230" x2="460" y2="244"/><line x1="490" y1="230" x2="480" y2="244"/>
    <line x1="510" y1="230" x2="500" y2="244"/><line x1="530" y1="230" x2="520" y2="244"/>
    <line x1="550" y1="230" x2="540" y2="244"/><line x1="570" y1="230" x2="560" y2="244"/>
  </g>
  <!-- wall hatch marks (top) -->
  <g stroke="#555" stroke-width="1">
    <line x1="110" y1="70" x2="100" y2="56"/><line x1="130" y1="70" x2="120" y2="56"/>
    <line x1="150" y1="70" x2="140" y2="56"/><line x1="170" y1="70" x2="160" y2="56"/>
    <line x1="190" y1="70" x2="180" y2="56"/><line x1="210" y1="70" x2="200" y2="56"/>
    <line x1="230" y1="70" x2="220" y2="56"/><line x1="250" y1="70" x2="240" y2="56"/>
    <line x1="270" y1="70" x2="260" y2="56"/><line x1="290" y1="70" x2="280" y2="56"/>
    <line x1="310" y1="70" x2="300" y2="56"/><line x1="330" y1="70" x2="320" y2="56"/>
    <line x1="350" y1="70" x2="340" y2="56"/><line x1="370" y1="70" x2="360" y2="56"/>
    <line x1="390" y1="70" x2="380" y2="56"/><line x1="410" y1="70" x2="400" y2="56"/>
    <line x1="430" y1="70" x2="420" y2="56"/><line x1="450" y1="70" x2="440" y2="56"/>
    <line x1="470" y1="70" x2="460" y2="56"/><line x1="490" y1="70" x2="480" y2="56"/>
    <line x1="510" y1="70" x2="500" y2="56"/><line x1="530" y1="70" x2="520" y2="56"/>
    <line x1="550" y1="70" x2="540" y2="56"/><line x1="570" y1="70" x2="560" y2="56"/>
  </g>

  <!-- inlet arrows -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
  <line x1="60"  y1="90"  x2="96"  y2="90"  stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="60"  y1="110" x2="96"  y2="110" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="60"  y1="130" x2="96"  y2="130" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="60"  y1="150" x2="96"  y2="150" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="60"  y1="170" x2="96"  y2="170" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="60"  y1="190" x2="96"  y2="190" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="60"  y1="210" x2="96"  y2="210" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="57" y="148" text-anchor="end" fill="#1d4ed8" font-size="12">u = U&#8208;in</text>
  <text x="57" y="163" text-anchor="end" fill="#1d4ed8" font-size="12">v = 0</text>

  <!-- outlet Poiseuille profile arrows -->
  <line x1="584" y1="150" x2="610" y2="150" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <line x1="584" y1="130" x2="601" y2="130" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <line x1="584" y1="170" x2="601" y2="170" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <line x1="584" y1="110" x2="592" y2="110" stroke="#dc2626" stroke-width="1.4" marker-end="url(#arr-red)"/>
  <line x1="584" y1="190" x2="592" y2="190" stroke="#dc2626" stroke-width="1.4" marker-end="url(#arr-red)"/>
  <!-- Poiseuille curve -->
  <path d="M580,72 Q625,150 580,228" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="630" y="143" fill="#b91c1c" font-size="12">&#x2202;u/&#x2202;x = 0</text>
  <text x="630" y="160" fill="#b91c1c" font-size="12">p = 0</text>

  <!-- wall labels -->
  <text x="340" y="48"  text-anchor="middle" fill="#374151" font-size="12">no-slip wall  u = 0  (ghost cell)</text>
  <text x="340" y="260" text-anchor="middle" fill="#374151" font-size="12">no-slip wall  u = 0  (ghost cell)</text>

  <!-- dimension arrows -->
  <!-- Lx -->
  <line x1="100" y1="278" x2="580" y2="278" stroke="#374151" stroke-width="1.2" marker-end="url(#arr-dim)" marker-start="url(#arr-dim)"/>
  <text x="340" y="294" text-anchor="middle" fill="#374151" font-size="13">Lx = 6</text>
  <!-- Ly -->
  <line x1="78" y1="70" x2="78" y2="230" stroke="#374151" stroke-width="1.2" marker-end="url(#arr-dim)" marker-start="url(#arr-dim)"/>
  <text x="73" y="154" text-anchor="end" fill="#374151" font-size="13">Ly = 1</text>

  <!-- panel title -->
  <text x="340" y="16" text-anchor="middle" fill="#111" font-size="14" font-weight="bold">Channel domain  (Re = 100,  Nx × Ny = 120 × 40)</text>

  <!-- ══════════════════════════════════════════════════════
       RIGHT PANEL — staggered cell
  ══════════════════════════════════════════════════════ -->

  <!-- panel border -->
  <rect x="650" y="30" width="155" height="260" rx="4" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="727" y="50" text-anchor="middle" fill="#111" font-size="13" font-weight="bold">Staggered cell</text>

  <!-- 2×2 mini-grid -->
  <g stroke="#d1d5db" stroke-width="1">
    <line x1="665" y1="65"  x2="790" y2="65"/>
    <line x1="665" y1="130" x2="790" y2="130"/>
    <line x1="665" y1="195" x2="790" y2="195"/>
    <line x1="665" y1="260" x2="790" y2="260"/>
    <line x1="665" y1="65"  x2="665" y2="260"/>
    <line x1="727" y1="65"  x2="727" y2="260"/>
    <line x1="790" y1="65"  x2="790" y2="260"/>
  </g>

  <!-- highlighted centre cell -->
  <rect x="665" y="130" width="62" height="65" fill="#fef9c3" stroke="#92400e" stroke-width="1.5"/>

  <!-- p at centre -->
  <rect x="690" y="155" width="10" height="10" fill="#1e3a8a" transform="rotate(45 695 160)"/>
  <text x="705" y="163" fill="#1e3a8a" font-size="11">p&#x1d62;&#x2c7c;</text>

  <!-- u faces -->
  <!-- west u face -->
  <polygon points="662,158 668,155 668,165" fill="#2563eb"/>
  <text x="637" y="154" fill="#2563eb" font-size="11">u&#x1d62;&#x2c7c;</text>
  <!-- east u face -->
  <polygon points="730,158 724,155 724,165" fill="#2563eb"/>
  <text x="731" y="154" fill="#2563eb" font-size="11">u&#x1d62;&#x208a;&#x2081;&#x2c7c;</text>

  <!-- v faces -->
  <!-- south v face -->
  <polygon points="694,133 700,133 697,127" fill="#dc2626"/>
  <text x="703" y="142" fill="#dc2626" font-size="11">v&#x1d62;&#x2c7c;</text>
  <!-- north v face -->
  <polygon points="694,192 700,192 697,198" fill="#dc2626"/>
  <text x="703" y="207" fill="#dc2626" font-size="11">v&#x1d62;&#x2c7c;&#x208a;&#x2081;</text>

  <!-- legend -->
  <rect x="662" y="218" width="9" height="9" fill="#1e3a8a" transform="rotate(45 666 222)"/>
  <text x="677" y="226" fill="#1e3a8a" font-size="11">pressure  p</text>
  <polygon points="660,237 666,234 666,240" fill="#2563eb"/>
  <text x="677" y="242" fill="#2563eb" font-size="11">u-face</text>
  <polygon points="663,251 669,251 666,245" fill="#dc2626"/>
  <text x="677" y="257" fill="#dc2626" font-size="11">v-face</text>

</svg>
