# RAE 2822 RANS case — M=0.729, AoA=2.31, Re=6.5e6

# Flow
mach            = 0.729
aoa_deg         = 2.31
gamma           = 1.4
reynolds        = 6.5e6
prandtl         = 0.72
prandtl_t       = 0.9

# Grid (RANS — fine near wall, y+ ~ 1)
ni_wrap         = 641       # corrected to 640 = 2*192 + 257 - 1 at runtime
nj_normal       = 129
n_airfoil       = 257
n_wake          = 192
r_far           = 25.0
tanh_beta       = 7.5       # strong wall clustering for y+ ~ 1

# Solver — SSP-RK3 explicit, laminar NS (Stage 3)
# reynolds=6.5e6 enables viscous fluxes + no-slip wall.
# cfl: warmup CFL (1st order, must stay near explicit stability: ~1.5)
# cfl_impl: CFL after order switch (2nd order + MUSCL + shock sensor)
# Note: j-direction MUSCL disabled — wake-cut ghost causes limit cycle on
# fine RANS mesh; i-direction MUSCL alone captures the transonic shock.
cfl             = 1.5
cfl_impl        = 0.8
omega           = 1.0
max_iter        = 20000
residual_drop   = 1.0e-5
scheme_order    = 2
warmup_iters    = 2000
output_interval = 1000
