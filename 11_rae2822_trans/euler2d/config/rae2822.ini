mach        = 0.729
aoa_deg     = 2.31
gamma       = 1.4

ni_wrap     = 256      # points around airfoil + wake (= 2*n_wake + n_airfoil - 1)
nj_normal   = 65       # points in normal direction
n_airfoil   = 129      # points on airfoil (must be odd)
n_wake      = 64       # points in each wake branch
r_far       = 25.0     # farfield radius in chords

cfl         = 1.5
cfl_muscl   = 0.8      # CFL pro MUSCL fazi (po warmup)
max_iter    = 20000
residual_drop = 1.0e-5
scheme_order = 2
warmup_iters = 5000    # run first-order for this many iters before switching to scheme_order
output_interval = 500
